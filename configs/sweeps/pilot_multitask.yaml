sweep:
  name: pilot_multitask
  output_dir: results/pilot_multitask
  seeds: [42, 123, 456]
  # 12 configuraciones × 3 seeds × 3 tareas = 108 corridas totales

reservoir:
  type: random_sparse
  N: 100
  sparsity: 0.9
  bias_scaling: 0.0
  # N, sparsity y bias_scaling fijos; spectral_radius, input_scaling y
  # leak_rate se barren en el grid

grid:
  spectral_radius: [0.7, 0.9, 1.1]
  input_scaling: [0.1, 0.2]
  leak_rate: [0.6, 1.0]
  # 3 × 2 × 2 = 12 configuraciones

tasks:
  narma10:
    n_train: 2000
    n_val: 500
    n_test: 1000
    washout: 200
    state_policy: reset   # cada split tiene warmup propio de longitud washout

  mackey_glass:
    n_train: 2000
    n_val: 500
    n_test: 1000
    washout: 200
    state_policy: reset
    tau: 17
    dt: 0.1

  memory_capacity:
    washout: 200
    input_length: 3000
    fit_fraction: 0.5
    kmax: 200             # fijado explícitamente para comparabilidad entre configs
    ridge_param: 1.0e-6

readout:
  type: ridge
  features: states
  ridge_candidates: [1.0e-8, 1.0e-6, 1.0e-4, 1.0e-2, 1.0e-1, 1.0]

metrics:
  - nmse
  - rmse

ranking:
  shortlist_top_n: 5
  narma10:
    metric: nmse          # debe estar en metrics[]
    direction: min        # menor nmse = mejor
  mackey_glass:
    metric: nmse          # debe estar en metrics[]
    direction: min
  memory_capacity:
    metric: mc_total      # métrica propia de MC, siempre disponible
    direction: max        # mayor mc_total = mejor
