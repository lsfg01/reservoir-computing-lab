frontier:
  name: esp_frontier_dilution
  output_dir: results/final_campaign/frontier/esp_frontier_dilution
  seeds: [42, 123, 456, 789, 1024, 2048, 4096]   # 7 semillas de campaña

esp:
  T: 8000          # subido: la frontera desplazada tiene washout mas largo
  n_pairs: 10
  eps: 1.0e-3

families:
  - name: random_sparse
    type: random_sparse
    N: 100
    sparsity: 0.9
    bias_scaling: 0.0

grid:
  spectral_radius: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.85, 0.9, 0.95, 1.0,
                    1.05, 1.1, 1.15, 1.2, 1.25, 1.3, 1.4, 1.5]
  input_scaling: [0.05, 0.10, 0.20, 0.40, 0.80, 1.50]
  leak_rate:     [1.0, 0.7, 0.5, 0.3, 0.1]

diagnostics:
  transient_kmax: 50
  saturation_window_frac: 0.5
