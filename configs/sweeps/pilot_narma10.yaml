sweep:
  name: pilot_sweep_narma10
  output_dir: results/pilot_sweep_narma10
  seeds: [42, 123, 456, 789, 1234]

task:
  name: narma10
  n_train: 2000
  n_val: 500
  n_test: 1000
  washout: 200
  state_policy: reset  # reset: cada split tiene warmup propio de longitud washout

reservoir:
  type: random_sparse
  N: 100
  sparsity: 0.9
  bias_scaling: 0.0
  # N, sparsity y bias_scaling se mantienen fijos en el pilot

grid:
  spectral_radius: [0.5, 0.7, 0.9, 1.1, 1.3]
  input_scaling: [0.05, 0.1, 0.2, 0.5]
  leak_rate: [0.3, 0.6, 1.0]
  # 5 x 4 x 3 = 60 configuraciones x 5 seeds = 300 corridas

readout:
  type: ridge
  features: states
  ridge_candidates: [1.0e-8, 1.0e-6, 1.0e-4, 1.0e-2, 1.0e-1, 1.0]

metrics:
  - nmse
  - rmse
