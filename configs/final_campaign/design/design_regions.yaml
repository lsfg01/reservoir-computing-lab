# design_regions.yaml — Design (Paso 2, campaña). UNION de regiones (grids) x 9 familias.
#
# Requiere el enhancement de `grids` en el runner de design (passthrough a
# MultiTaskSweepRunner). 37 config points en 3 bloques; 9 familias que RE-BARREN
# los ejes topologicos sobre las regiones nuevas (no heredan a los ganadores de
# prelim). Tareas IDENTICAS al sweep de campaña; 7 semillas de campaña.
#
# LIMITACION declarada: no se incluye reservoir ortogonal/unitario, que es
# optimo en memoria lineal (MC). El brazo de memoria no contiene, por tanto, la
# topologia teoricamente campeona en MC; tenerlo en cuenta al interpretar.

sweep:
  name: design_regions
  output_dir: results/final_campaign/design
  seeds: [42, 123, 456, 789, 1024, 2048, 4096]

# --- UNION de regiones (37 pts) --------------------------------------------
grids:
  # Bloque 1 — compromiso + memoria (fusion zonas 1+2): memoria / NARMA / MC.
  - spectral_radius: [0.95, 1.0]
    input_scaling:   [0.05, 0.1, 0.2]
    leak_rate:       [0.9, 1.0]
  # Bloque 2 — no-lineal con fuga (fusion zonas 3+4, caja): especialista MG + bridge.
  #   rho=1.4 / s_in=0.4 (leak 0.3 y 0.5) cruzan frontera: controles de borde.
  - spectral_radius: [1.0, 1.2, 1.4]
    input_scaling:   [0.4, 0.8, 1.0, 1.5]
    leak_rate:       [0.3, 0.5]
  # Bloque 3 — transition control: mejor MG en regimen de memoria (leak alto).
  - spectral_radius: [1.0]
    input_scaling:   [0.4]
    leak_rate:       [0.9]

# --- 9 familias: cada eje topologico barrido con su parametro ---------------
designs:
  - name: random_sparse_baseline
    reservoir: {type: random_sparse, N: 100, sparsity: 0.9, bias_scaling: 0.0}
  - name: cycle_scr
    reservoir: {type: cycle, N: 100, cycle_weight: 1.0, bias_scaling: 0.0}
  - name: cycle_jump_j3
    reservoir: {type: cycle_jump, N: 100, jumps: [3], jump_weight: 0.3, cycle_weight: 1.0, bias_scaling: 0.0}
  - name: cycle_jump_j7
    reservoir: {type: cycle_jump, N: 100, jumps: [7], jump_weight: 0.3, cycle_weight: 1.0, bias_scaling: 0.0}
  - name: nonnormal_chain_g0_1
    reservoir: {type: nonnormal_chain, N: 100, chain_strength: 0.1, bias_scaling: 0.0}
  - name: nonnormal_chain_g0_3
    reservoir: {type: nonnormal_chain, N: 100, chain_strength: 0.3, bias_scaling: 0.0}
  - name: nonnormal_chain_g0_6
    reservoir: {type: nonnormal_chain, N: 100, chain_strength: 0.6, bias_scaling: 0.0}
  - name: multiscale_two_random
    reservoir: {type: multiscale, N: 100, preset: two_scale_random, sparsity: 0.9,
                coupling_strength: 0.05, coupling_density: 0.2, coupling_mode: adjacent,
                coupling_direction: bidirectional, bias_scaling: 0.0}
  - name: multiscale_three_random
    reservoir: {type: multiscale, N: 100, preset: three_scale_random, sparsity: 0.9,
                coupling_strength: 0.05, coupling_density: 0.2, coupling_mode: adjacent,
                coupling_direction: bidirectional, bias_scaling: 0.0}

tasks:
  narma10:
    enabled: true
    name: narma10
    n_train: 2400
    n_val: 600
    n_test: 1000
    washout: 1000
    state_policy: reset

  mackey_glass:
    enabled: true
    name: mackey_glass
    n_train: 2400
    n_val: 600
    n_test: 1000
    washout: 1000
    state_policy: reset
    tau: 17
    dt: 0.1
    beta: 0.2
    gamma: 0.1
    n: 10
    prediction_horizon: 84
    sample_stride: 10
    discard_transient: 1000
    initial_history: random_uniform
    history_low: 1.1
    history_high: 1.3

  memory_capacity:
    enabled: true
    washout: 1000
    input_length: 6000
    fit_fraction: 0.5
    kmax: 100
    ridge_param: 1.0e-6

readout:
  type: ridge
  features: states
  ridge_candidates: [1.0e-10, 1.0e-8, 1.0e-6, 1.0e-4, 1.0e-2, 1.0]

metrics: [nmse, rmse]

ranking:
  shortlist_top_n: 15
  narma10: {metric: nmse, direction: min}
  mackey_glass: {metric: nmse, direction: min}
  memory_capacity: {metric: mc_total, direction: max}

diagnostics:
  transient_kmax: 150
